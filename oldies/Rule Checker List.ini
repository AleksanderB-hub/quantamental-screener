# Rules List

## List 1: Based on Company Data alone 

### Technical Indicators (Price & Volume)
1. Share Price (current) > 50-day moving average (MA) ✔️
2. 50 day MA > 200 day MA ✔️
3. 13-week RSI > 25-week RSI ✔️
4. 20-day On Balance Volume (OBV) is positive ✔️

### Valuation & Ratios
1. PEG Ratio > 0.1 and <= 0.5 ✔️
2. PEG Ratio < 1.0 ✔️
3. PEG Ratio < 1.5 ✔️
4. P/B Ratio < 2 ✔️
5. Dividend Yield = 0% (zero dividend) ✔️
6. Market Cap to Cash Flow Ratio < 3 ✔️

### Financial Health (Balance Sheet/Cash Flow)

1. Debt/Equity (D/E) Ratio < 1 ✔️
2. Cash Ratio > 1 ✔️
3. Current Year Free Cash Flow (FCF) > Previous Year ✔️
4. Cash Flow from Operations > Net Income ✔️
5. Free Cash Flow > 0 ✔️
6. ROA (Return on Assets) > 0 ✔️
7. Cash Ratio of current year > last year ✔️
8. Ratio of Cash to Current Liabilities > Last year ✔️

## List 2: Based on Company data and industry/market averages 

### Percentile Rankings

1. Market Cap in top 30% (and top 25%) ✔️

2. Free Cash Flow in top 30%. ✔️

3. PE Ratio in bottom 40% (and lowest 20%). ✔️ ✔️

### Industry comparisons  

#### Valuation

1. PE < Industry Average. ✔️

2. P/B < Industry Average. ✔️

3. Dividend Yield > Industry Average. ✔️

#### Profitability

1. Net Profit Margin > Industry Average. ✔️

2. Gross Profit Margin > Industry Average. ✔️

3. Operating Margin > Industry Average. ✔️

4. ROE > Industry Average. ✔️

#### Structure 

1. Ratio of Total Liabilities to Total Assets < Industry Average. ✔️

2. Ratio of Long Term Debt to Equity < Industry Average. ✔️

3. Ratio of Total Assets to Liabilities > Industry Average. ✔️

4. Ratio of Sales to Total Assets > Industry Average. ✔️

#### Growth 

1. Sales Growth (3yr) > Industry Average. ✔️

2. EPS Growth > Industry Average. ✔️

3. Current Year EPS % Change > Industry Average. ✔️

4. Net Profit Margin > Industry Avg for 3 years (Requires calculating industry avg for 3 separate years). ✔️

## List 3 Historical Data

1. Free Cash Flow growing for 3 years in a row. ✔️ (adjusted for dynamic retrieval, can be previous 2 or 1 year)

2. ROE > 15% for past 3 years. ✔️ (adjusted for dynamic retrieval, can be previous 2 or 1 year)
 
3. Net Income Growth > 8% (CAGR 3 year). ✔️ (adjusted for dynamic retrieval, can be previous 2 or 1 year)

4. Sales Growth > R&D Growth. ✔️

5. Operating Margin > Past 3 Year Average (Adapted from 5). ✔️ (adjusted for dynamic retrieval, can be previous 2 or 1 year)


# Redacted Rules (and why?)
## List 1
1. Forecast cash flow per share in five years > share price	
reason: "API Limit" yfinance does not provide robust 5-year DCF (Discounted Cash Flow) forecasts. This requires a premium data feed (like Morningstar/FactSet).
2. Forecast growth rate of EPS > this year
reason: "API Limit" Forward-looking analyst estimates are notoriously flaky or missing in the free API.
3. Forecast EPS next year higher than last	
reason: "API Limit" Same as above. Reliable forward estimates are premium data.
4. EPS estimate revised upward at least once	
reason: API Limit "Estimate Revisions" (Momentum of analysts changing their minds) is a specific premium dataset not available here.
5. Number of analysts following stock <= 5	
reason: "Data Quality" While info sometimes has numberOfAnalystOpinions, it is often null or outdated for smaller caps, making the rule effectively filter out valid stocks randomly.
6. Growth rate in market value > growth rate in book value	
reason: "Complexity" yfinance gives current Market Cap, but calculating Historical Market Cap (e.g., 3 years ago) requires historical Share Counts, which are not returned in the standard history call.

## List 2

1. Compounded annualized percent growth > zero	
reason: "Redundancy" This is effectively covered by "Sales Growth (3yr) > Industry Average" and "Sales growing for 3 years streak". If you beat the industry and have a streak, you are growing > 0.
2. PE Ratio in lowest 20%	
reason: "Optimization" We implemented "PE Bottom 40%" and "PE < Industry Median". Adding a third, stricter PE filter (Bottom 20%) often returns zero results when combined with high-quality growth metrics (Quality stocks are rarely in the absolute bottom 20% of valuation).

## List 3


1. Percent change in EPS growing for past 5 years	
reason: "Data Availability" Cannot see beyond 3 years outlook 
2. Ratio of long term debt to equity in 5 years < last two	
reason: "Data Availability" We cannot see the Balance Sheet from 5 years ago.
3. PE Ratio < PE Ratio of last 5 years	
reason: "Computational Complexity" To do this, we would need to fetch the Stock Price on specific dates in the past (e.g., Dec 31, 2020) and merge it with the Earnings from that specific year. This "Point-in-Time" matching is extremely prone to errors in simple scripts (e.g., fiscal year vs calendar year mismatches).
4. The percentage changes in earnings over 12 months and 5 years are positive	
reason: "Redundancy/Data Limit" The 5-year part is impossible. The 12-month part is covered by "Current Year EPS % Change"




